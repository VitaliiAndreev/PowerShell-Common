name: Tag from manifest version
description: >
  Creates and pushes a git tag matching the ModuleVersion in the .psd1
  manifest. If the tag already exists the step is skipped. Manages the
  module tag stream (bare X.Y.Z) only - the GitHub Actions consumer tag
  stream (vX.Y.Z + rolling vX) lives in Publish-VersionTags.ps1 and
  advances independently; the two namespaces never collide. Requires the
  calling workflow to have 'permissions: contents: write' and to check
  out with 'fetch-depth: 0' so all existing tags are visible.

inputs:
  psd1:
    description: >
      Relative path to the .psd1 manifest inside the caller's repository
      (e.g. 'PowerShell.Common\PowerShell.Common.psd1').
    required: true

outputs:
  tag_created:
    description: "'true' if a new tag was created, 'false' if it already existed."
    value: ${{ steps.tag.outputs.tag_created }}

runs:
  using: composite
  steps:
    - name: Tag from manifest version
      id: tag
      shell: pwsh
      # ${{ github.action_path }} is substituted by the runner before PowerShell
      # runs - it becomes the literal path where the runner downloaded this
      # action's source files (a separate clone of PowerShell-Common).
      # The caller's working directory is unaffected, so the script does not
      # need to exist in the caller's repository.
      run: |
        . "${{ github.action_path }}\Invoke-TagFromManifest.ps1"
        Invoke-TagFromManifest -Psd1 '${{ inputs.psd1 }}'
