name: CI (Docker host)

# Reusable workflow that runs integration tests. Delegates to the
# run-integration-tests composite action in Infrastructure-Common, which
# contains all the Docker run logic. Consumer repos call this workflow from
# their own ci-docker-host.yml and optionally pass docker-image to pin a
# specific Ubuntu variant (see action inputs for when this is needed).

on:
  pull_request:
    branches: [ main, master ]
  workflow_call:
    inputs:
      docker-image:
        description: >
          Docker image to run integration tests in. Defaults to
          mcr.microsoft.com/powershell:latest. Consumer repos that install
          system packages (e.g. openssh-server) during tests can pin a
          specific Ubuntu variant to avoid apt compatibility issues.
        required: false
        type: string
        default: 'mcr.microsoft.com/powershell:latest'
  workflow_dispatch:

jobs:
  integration:
    name: Integration (PowerShell 7) - Docker host tests
    runs-on: ubuntu-latest

    # Explicit read-only token. Without this the job inherits whatever the
    # caller granted - which is nothing when the calling repo's "Workflow
    # permissions" default is set to "no permissions" - and actions/checkout
    # fails with "could not read Username for 'https://github.com'" because
    # the auth header is empty. Declaring contents:read at the job level of
    # the reusable workflow overrides the caller's default and lets the
    # checkout step authenticate via the auto-provided GITHUB_TOKEN.
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Local action paths only resolve within the same repo/branch, so the
      # scan and run steps are duplicated with conditional guards. Exactly one
      # of each pair runs; the || fallbacks below merge the outputs safely.
      - name: Scan for integration tests (local)
        id: scan-local
        if: ${{ github.repository == 'VitaliiAndreev/Infrastructure-Common' }}
        uses: ./.github/actions/scan-integration-tests
        with:
          test-dir: Tests/Integration.DockerHost
          check-module-dir: 'true'

      - name: Scan for integration tests (consumer)
        id: scan-consumer
        if: ${{ github.repository != 'VitaliiAndreev/Infrastructure-Common' }}
        uses: VitaliiAndreev/Infrastructure-Common/.github/actions/scan-integration-tests@master
        with:
          test-dir: Tests/Integration.DockerHost
          check-module-dir: 'true'

      - name: Run integration tests (local)
        if: ${{ steps.scan-local.outputs.has-tests == 'true' }}
        uses: ./.github/actions/run-integration-tests
        with:
          docker-image: ${{ inputs.docker-image || 'mcr.microsoft.com/powershell:latest' }}
          test-file-paths: ${{ steps.scan-local.outputs.test-file-paths }}
          module-dir: ${{ steps.scan-local.outputs.module-dir }}

      - name: Run integration tests (consumer)
        if: ${{ steps.scan-consumer.outputs.has-tests == 'true' }}
        uses: VitaliiAndreev/Infrastructure-Common/.github/actions/run-integration-tests@master
        with:
          docker-image: ${{ inputs.docker-image || 'mcr.microsoft.com/powershell:latest' }}
          test-file-paths: ${{ steps.scan-consumer.outputs.test-file-paths }}
          module-dir: ${{ steps.scan-consumer.outputs.module-dir }}
