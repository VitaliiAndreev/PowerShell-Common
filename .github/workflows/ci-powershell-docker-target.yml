name: CI (Docker target)

# Reusable workflow for repos whose integration tests connect to a Docker
# container via SSH (Infrastructure-GitHubRunners pattern). Builds the SSH
# test image with GHA layer caching, then runs Pester directly on the host
# so the tests can control Docker themselves.
#
# Consumer repos call this from their own workflow:
#
#   jobs:
#     ci-docker-target:
#       uses: VitaliiAndreev/Infrastructure-Common/.github/workflows/ci-powershell-docker-target.yml@master

on:
  pull_request:
    branches: [ main, master ]
  workflow_call:
  workflow_dispatch:

jobs:
  integration:
    name: Integration (PowerShell 7) - Docker host SSH target
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      # Local action paths only resolve within the same repo/branch, so the
      # scan and run steps are duplicated with conditional guards. Exactly one
      # of each pair runs; the || fallback below merges has-tests safely.
      - name: Scan for integration tests (local)
        id: scan-local
        if: ${{ github.repository == 'VitaliiAndreev/Infrastructure-Common' }}
        uses: ./.github/actions/scan-integration-tests
        with:
          test-dir: Tests/Integration.DockerTarget

      - name: Scan for integration tests (consumer)
        id: scan-consumer
        if: ${{ github.repository != 'VitaliiAndreev/Infrastructure-Common' }}
        uses: VitaliiAndreev/Infrastructure-Common/.github/actions/scan-integration-tests@master
        with:
          test-dir: Tests/Integration.DockerTarget

      - if: >-
          ${{
            (steps.scan-local.outputs.has-tests == 'true' ||
             steps.scan-consumer.outputs.has-tests == 'true') &&
            github.repository == 'VitaliiAndreev/Infrastructure-Common'
          }}
        uses: ./.github/actions/build-ssh-test-image

      - if: >-
          ${{
            (steps.scan-local.outputs.has-tests == 'true' ||
             steps.scan-consumer.outputs.has-tests == 'true') &&
            github.repository == 'VitaliiAndreev/Infrastructure-Common'
          }}
        uses: ./.github/actions/run-ssh-integration-tests

      - if: >-
          ${{
            (steps.scan-local.outputs.has-tests == 'true' ||
             steps.scan-consumer.outputs.has-tests == 'true') &&
            github.repository != 'VitaliiAndreev/Infrastructure-Common'
          }}
        uses: VitaliiAndreev/Infrastructure-Common/.github/actions/build-ssh-test-image@master

      - if: >-
          ${{
            (steps.scan-local.outputs.has-tests == 'true' ||
             steps.scan-consumer.outputs.has-tests == 'true') &&
            github.repository != 'VitaliiAndreev/Infrastructure-Common'
          }}
        uses: VitaliiAndreev/Infrastructure-Common/.github/actions/run-ssh-integration-tests@master
