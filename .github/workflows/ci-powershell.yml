name: CI

# Reusable unit-test workflow for PowerShell repos. Checks out
# Infrastructure-Common and calls Run-Tests.ps1 directly, excluding
# Tests\Integration\ automatically. Integration tests run separately via
# ci-powershell-docker-host.yml and ci-powershell-docker-target.yml.
#
# Consumer repos call this workflow from their own ci.yml instead of
# maintaining their own run-tests logic for CI.

on:
  pull_request:
    branches: [ main, master ]
  workflow_call:
  workflow_dispatch:

jobs:
  ci-ps7:
    name: Unit (PowerShell 7)
    runs-on: windows-latest

    # See ci-powershell-docker-host.yml for why this is declared at the
    # job level of the reusable workflow rather than left to the caller.
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - uses: actions/checkout@v5
        with:
          repository: VitaliiAndreev/Infrastructure-Common
          ref: ${{ github.repository == 'VitaliiAndreev/Infrastructure-Common' && github.sha || 'master' }}
          path: .ci-common

      # Lint pass before the unit tests because (a) it is far faster
      # and a failure here usually points at a real bug not an
      # environment hiccup, and (b) it lets the operator notice the
      # lint signal even if the unit suite later goes red for an
      # unrelated reason.
      #
      # Logic + comment-aware regex live in the script alongside
      # other reusable action helpers; see its header for rationale.
      - name: Lint - no bare `return @()`
        shell: pwsh
        run: |
          .ci-common/.github/actions/lint-no-bare-return-empty-array/Test-NoBareReturnEmptyArray.ps1 `
            -SourceRoot '${{ github.workspace }}'

      - name: Run unit tests
        shell: pwsh
        run: |
          .ci-common/.github/actions/run-unit-tests/Run-Tests.ps1 `
            -TestsRoot '${{ github.workspace }}'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-ps7
          path: TestResults.xml
