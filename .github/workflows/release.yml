name: Release

on:
  push:
    branches:
      - master
    paths:
      # Only fire when the manifest itself changes, not on every push.
      - 'Infrastructure.Common/Infrastructure.Common.psd1'
  workflow_dispatch:

jobs:
  check-version:
    runs-on: windows-latest
    outputs:
      version_is_new: ${{ steps.check.outputs.version_is_new }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: check
        uses: ./.github/actions/check-version-is-new
        with:
          psd1: 'Infrastructure.Common\Infrastructure.Common.psd1'

  test-unit:
    needs: check-version
    if: needs.check-version.outputs.version_is_new == 'true'
    uses: ./.github/workflows/ci-powershell.yml

  test-integration-host:
    needs: check-version
    if: needs.check-version.outputs.version_is_new == 'true'
    uses: ./.github/workflows/ci-powershell-docker-host.yml

  test-integration-target:
    needs: check-version
    if: needs.check-version.outputs.version_is_new == 'true'
    uses: ./.github/workflows/ci-powershell-docker-target.yml

  tag:
    needs: [ check-version, test-unit, test-integration-host, test-integration-target ]
    if: needs.check-version.outputs.version_is_new == 'true'
    permissions:
      contents: write
    uses: ./.github/workflows/tag.yml
    with:
      psd1: 'Infrastructure.Common\Infrastructure.Common.psd1'

  publish:
    needs: tag
    if: needs.tag.outputs.tag_created == 'true'
    uses: ./.github/workflows/publish.yml
    with:
      module-path: Infrastructure.Common
    secrets:
      PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
